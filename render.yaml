services:
  - type: web
    name: beauty-elegance-admin
    runtime: node
    plan: free
    buildCommand: npm install --include=dev --build-from-source=sqlite3 && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_PATH
        value: ./database/database.sqlite
      - key: JWT_SECRET
        generateValue: true
