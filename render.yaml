services:
  - type: web
    name: beauty-elegance-admin
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_PATH
        value: /var/data/database.sqlite
      - key: JWT_SECRET
        generateValue: true
    disk:
      name: db-storage
      mountPath: /var/data
      sizeGB: 1
